# コード品質検証ワークフロー
# プルリクエスト時にTypeScript（tsgo）の型チェックとテストを並列実行
name: Code Validation

on:
  pull_request: # プルリクエスト作成・更新時にトリガー

jobs:
  # 変更されたファイルパスを検出
  changes:
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.changes.outputs.typescript }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          filters: |
            typescript:
              - '**/*.ts'
              - '**/*.tsx'
              - 'tsconfig.json'
              - 'package.json'
              - 'pnpm-lock.yaml'

  # TypeScriptの型チェック（TypeScript関連ファイル変更時のみ実行）
  typecheck:
    name: TypeScript Check
    needs: changes
    if: ${{ needs.changes.outputs.typescript == 'true' }}
    runs-on: ubuntu-latest
    steps:
      # リポジトリのチェックアウト
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      # 開発環境の共通セットアップ（mise + pnpm install）
      - uses: ./.github/actions/setup
      # TypeScriptの型チェック実行（tsgo）
      - run: bun run typecheck

  # テスト実行
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      # リポジトリのチェックアウト
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      # 開発環境の共通セットアップ（mise + pnpm install）
      - uses: ./.github/actions/setup
      # テスト実行
      - run: bun test
