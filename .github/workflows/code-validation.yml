# コード品質検証ワークフロー
# プルリクエスト時にTypeScriptの型チェックとテストを並列実行
name: Code Validation

on:
  pull_request: # プルリクエスト作成・更新時にトリガー

jobs:
  # 変更されたファイルパスを検出
  changes:
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.changes.outputs.typescript }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: changes
        with:
          filters: |
            typescript:
              - '**/*.ts'
              - '**/*.tsx'
              - 'tsconfig.json'
              - 'package.json'
              - 'pnpm-lock.yaml'

  # TypeScriptの型チェック（TypeScript関連ファイル変更時のみ実行）
  typecheck:
    name: TypeScript Check
    needs: changes
    if: ${{ needs.changes.outputs.typescript == 'true' }}
    runs-on: ubuntu-latest
    steps:
      # リポジトリのチェックアウト
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # 開発環境の共通セットアップ（mise + pnpm install）
      - uses: ./.github/actions/setup
      # TypeScriptの型チェック実行（tsc）
      - run: pnpm run typecheck

  # テスト実行
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      # リポジトリのチェックアウト
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # 開発環境の共通セットアップ（mise + pnpm install）
      - uses: ./.github/actions/setup
      # テスト実行
      - run: pnpm run test
